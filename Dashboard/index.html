<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Email Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root {
    --bg: #f4f6f9;
    --card: #ffffff;
    --text: #111;
}

body.dark {
    --bg: #0f172a;
    --card: #1e293b;
    --text: #fff;
}

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
}

/* Sidebar */
.sidebar {
    width: 220px;
    background: #111827;
    color: white;
    height: 100vh;
    padding: 20px;
}

/* Main */
.main {
    flex: 1;
    padding: 20px;
}

/* Topbar */
.topbar {
    display: flex;
    justify-content: space-between;
    margin-bottom: 20px;
}

/* Cards */
.cards {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 15px;
}

.card {
    background: var(--card);
    padding: 20px;
    border-radius: 12px;
}

/* Charts */
.charts {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
}

.chart-box {
    background: var(--card);
    padding: 15px;
    border-radius: 12px;
    height: 300px;
}

/* Table */
.table-box {
    margin-top: 20px;
    background: var(--card);
    padding: 15px;
    border-radius: 12px;
}

input {
    padding: 8px;
    width: 200px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

/* Notification */
#toast {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: black;
    color: white;
    padding: 10px 20px;
    border-radius: 8px;
    display: none;
}
</style>
</head>

<body>

<div class="sidebar">
<h2>📧 Dashboard</h2>
</div>

<div class="main">

<div class="topbar">
    <h2>Email Analytics</h2>
    <div>
        <input type="text" id="search" placeholder="Search email...">
        <button onclick="toggleTheme()">🌙</button>
    </div>
</div>

<div class="cards">
<div class="card"><h2 id="total">0</h2><p>Total</p></div>
<div class="card"><h2 id="processed">0</h2><p>Processed</p></div>
<div class="card"><h2 id="pending">0</h2><p>Pending</p></div>
<div class="card"><h2 id="accuracy">95%</h2><p>Model Accuracy</p></div>
</div>

<div class="charts">
<div class="chart-box"><canvas id="barChart"></canvas></div>
<div class="chart-box"><canvas id="pieChart"></canvas></div>
</div>

<div class="table-box">
<h3>Recent Emails</h3>
<table>
<thead>
<tr><th>Sender</th><th>Subject</th><th>Category</th></tr>
</thead>
<tbody id="tableBody"></tbody>
</table>
</div>

</div>

<div id="toast">📩 New Email Received!</div>

<script>
function toggleTheme() {
    document.body.classList.toggle("dark");
}

const barChart = new Chart(barChart = document.getElementById("barChart"), {
    type: "bar",
    data: { labels: [], datasets: [{ data: [] }] }
});

const pieChart = new Chart(document.getElementById("pieChart"), {
    type: "pie",
    data: { labels: [], datasets: [{ data: [] }] }
});

let lastTotal = 0;

async function loadData() {
    const res = await fetch("http://127.0.0.1:5000/stats");
    const data = await res.json();

    total.innerText = data.total;
    processed.innerText = data.processed;
    pending.innerText = data.pending;

    if (data.total > lastTotal) {
        showToast();
    }
    lastTotal = data.total;

    const labels = Object.keys(data.categories);
    const values = Object.values(data.categories);

    barChart.data.labels = labels;
    barChart.data.datasets[0].data = values;
    barChart.update();

    pieChart.data.labels = labels;
    pieChart.data.datasets[0].data = values;
    pieChart.update();

    let rows = "";
    const search = document.getElementById("search").value.toLowerCase();

    data.recent.forEach(r => {
        if (r[1].toLowerCase().includes(search)) {
            rows += `<tr>
                <td>${r[0]}</td>
                <td>${r[1]}</td>
                <td>${r[2]}</td>
            </tr>`;
        }
    });

    tableBody.innerHTML = rows;
}

function showToast() {
    const toast = document.getElementById("toast");
    toast.style.display = "block";
    setTimeout(() => toast.style.display = "none", 3000);
}

setInterval(loadData, 3000);
loadData();
</script>

</body>
</html>
